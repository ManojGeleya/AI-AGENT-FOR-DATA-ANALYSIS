    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --primary-color: #0f172a; /* Slate 900 */
            --primary-light: #1e293b; /* Slate 800 */
            --accent-color: #6366f1; /* Indigo 500 */
            --accent-glow: rgba(99, 102, 241, 0.5);
            --bg-color: #0f172a; /* Dark Background */
            --sidebar-width: 280px;
            --header-height: 70px;
        }
    }

    @layer base {
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.08), transparent 25%);
            color: #f8fafc;
            overflow-x: hidden;
        }
    }

    @layer components {
        .btn {
            @apply inline-flex items-center justify-center px-5 py-2.5 rounded-xl font-medium transition-all duration-300 transform active:scale-95 cursor-pointer;
        }
        .btn-primary {
            @apply bg-gradient-to-r from-indigo-500 to-purple-600 text-white shadow-lg shadow-indigo-500/30 hover:shadow-indigo-500/50 hover:-translate-y-0.5 border border-white/10;
        }
        .btn-glass {
            @apply bg-white/10 backdrop-blur-md border border-white/10 text-white hover:bg-white/20 shadow-lg;
        }
        
        .card-glass {
            @apply bg-slate-900/60 backdrop-blur-xl border border-white/5 rounded-2xl shadow-xl transition-all duration-300;
        }
        
        .card-3d {
            @apply card-glass hover:shadow-2xl hover:shadow-indigo-500/10 hover:border-white/10 hover:-translate-y-1 relative overflow-hidden;
        }

        .input-glass {
            @apply w-full px-4 py-3 bg-slate-800/50 border border-slate-700/50 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500/50 text-slate-200 placeholder-slate-500 transition-all;
        }

        .sidebar-link {
            @apply flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all duration-200 relative overflow-hidden cursor-pointer;
        }
        .sidebar-link.active {
            @apply bg-indigo-600/20 text-indigo-300 shadow-inner shadow-indigo-500/10 border border-indigo-500/20;
        }
        .sidebar-link.active::before {
            content: '';
            @apply absolute left-0 top-1/2 -translate-y-1/2 w-1 h-8 bg-indigo-500 rounded-r-full shadow-[0_0_10px_rgba(99,102,241,0.6)];
        }
    }
    
    /* Animations */
    @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
    }
    .animate-float {
        animation: float 6s ease-in-out infinite;
    }
    
    @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 15px rgba(99, 102, 241, 0.2); }
        50% { box-shadow: 0 0 25px rgba(99, 102, 241, 0.5); }
    }
    .animate-pulse-glow {
        animation: pulse-glow 3s infinite;
    }

    @keyframes slide-up-fade {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
    }
    .animate-slide-up {
        animation: slide-up-fade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes flow-line {
        0% { stroke-dashoffset: 1000; }
        100% { stroke-dashoffset: 0; }
    }
    .animate-flow {
        stroke-dasharray: 20;
        animation: flow-line 2s linear infinite;
    }

    /* Custom Scrollbar */
    .no-scrollbar::-webkit-scrollbar {
        display: none;
    }
    .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }

    ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
    }
    ::-webkit-scrollbar-track {
        background: rgba(15, 23, 42, 0.5);
    }
    ::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: #475569;
    }
    
    /* 3D Perspective Utils */
    .perspective-1000 {
        perspective: 1000px;
    }
    .preserve-3d {
        transform-style: preserve-3d;
    }
    .rotate-y-12 {
        transform: rotateY(12deg);
    }
    .rotate-x-12 {
        transform: rotateX(12deg);
    }
